server:
  port: 8080

spring:
  application:
    name: ecommerce-working
    
  datasource:
    url: jdbc:mysql://localhost:3306/ecommerce_simple?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
    username: root
    password: password  # ⚠️ THAY BẰNG MYSQL PASSWORD CỦA BẠN
    driver-class-name: com.mysql.cj.jdbc.Driver
    
  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        
  security:
    user:
      name: admin
      password: admin123
      roles: ADMIN

logging:
  level:
    com.ecommerce.working: INFO
    org.springframework.security: INFO