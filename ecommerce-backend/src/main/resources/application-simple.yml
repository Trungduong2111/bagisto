spring:
  datasource:
    url: jdbc:h2:mem:testdb
    username: sa
    password: 
    driver-class-name: org.h2.Driver
    
  h2:
    console:
      enabled: true
      path: /h2-console
      
  jpa:
    hibernate:
      ddl-auto: create
    show-sql: false
    defer-datasource-initialization: true
    
  sql:
    init:
      mode: never  # Don't load data initially
      
# Application specific properties  
app:
  jwt:
    access-token:
      secret: myAccessTokenSecret123456789012345678901234567890
      expiration: 900000 # 15 minutes
    refresh-token:
      secret: myRefreshTokenSecret123456789012345678901234567890
      expiration: 604800000 # 7 days
      max-tokens-per-user: 5

logging:
  level:
    root: WARN
    com.ecommerce.backend: INFO
    org.hibernate: WARN