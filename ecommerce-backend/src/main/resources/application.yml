server:
  port: 8080
  servlet:
    context-path: /
  error:
    include-message: always
    include-binding-errors: always

spring:
  application:
    name: ecommerce-backend
  
  profiles:
    active: dev
  
  datasource:
    url: jdbc:mysql://localhost:3306/ecommerce_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: password
    driver-class-name: com.mysql.cj.jdbc.Driver
    
  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
        use_sql_comments: true
    open-in-view: false
    defer-datasource-initialization: true
    
  jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: Asia/Ho_Chi_Minh
    
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

# Application specific properties
app:
  jwt:
    # Access Token Configuration
    access-token:
      secret: myAccessTokenSecret123456789012345678901234567890
      expiration: 900000 # 15 minutes in milliseconds
    
    # Refresh Token Configuration  
    refresh-token:
      secret: myRefreshTokenSecret123456789012345678901234567890
      expiration: 604800000 # 7 days in milliseconds
      max-tokens-per-user: 5 # Maximum refresh tokens per user
    
    # Backward compatibility
    secret: mySecretKey123456789012345678901234567890
    expiration: 86400000 # 24 hours in milliseconds
    
  cors:
    allowed-origins: 
      - http://localhost:3000
      - http://localhost:3001
      - http://localhost:8081
    allowed-methods: GET,POST,PUT,DELETE,PATCH,OPTIONS
    allowed-headers: "*"
    allow-credentials: true

# Logging configuration
logging:
  level:
    com.ecommerce.backend: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/ecommerce-backend.log

# Actuator endpoints
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

# Springdoc OpenAPI configuration
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha
    tryItOutEnabled: true
    filter: true

---
# Development profile
spring:
  config:
    activate:
      on-profile: dev
  
  datasource:
    url: jdbc:h2:mem:ecommerce_dev
    username: sa
    password: 
    driver-class-name: org.h2.Driver
    
  h2:
    console:
      enabled: true
      path: /h2-console
      
  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true
    defer-datasource-initialization: true
    
  sql:
    init:
      mode: always
      data-locations: classpath:data-h2.sql
    
logging:
  level:
    root: INFO
    com.ecommerce.backend: DEBUG

---
# Production profile
spring:
  config:
    activate:
      on-profile: prod
      
  datasource:
    url: ${DATABASE_URL:jdbc:mysql://localhost:3306/ecommerce_prod}
    username: ${DATABASE_USERNAME:ecommerce_user}
    password: ${DATABASE_PASSWORD:secure_password}
    
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    
app:
  jwt:
    access-token:
      secret: ${JWT_ACCESS_TOKEN_SECRET:myProductionAccessTokenSecret123456789012345678901234567890}
      expiration: ${JWT_ACCESS_TOKEN_EXPIRATION:900000}
    refresh-token:
      secret: ${JWT_REFRESH_TOKEN_SECRET:myProductionRefreshTokenSecret123456789012345678901234567890}
      expiration: ${JWT_REFRESH_TOKEN_EXPIRATION:604800000}
      max-tokens-per-user: ${JWT_MAX_TOKENS_PER_USER:5}
    # Backward compatibility
    secret: ${JWT_SECRET:myProductionSecretKey123456789012345678901234567890}
    expiration: ${JWT_EXPIRATION:86400000}

logging:
  level:
    root: WARN
    com.ecommerce.backend: INFO
  file:
    name: /var/log/ecommerce-backend.log

---
# Test profile
spring:
  config:
    activate:
      on-profile: test
      
  datasource:
    url: jdbc:h2:mem:ecommerce_test
    username: sa
    password: 
    driver-class-name: org.h2.Driver
    
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    
logging:
  level:
    root: WARN
    com.ecommerce.backend: INFO