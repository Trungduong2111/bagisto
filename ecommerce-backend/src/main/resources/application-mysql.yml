spring:
  datasource:
    url: jdbc:mysql://localhost:3306/ecommerce_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: password  # Thay bằng MySQL password của bạn
    driver-class-name: com.mysql.cj.jdbc.Driver
    
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
        use_sql_comments: true
    defer-datasource-initialization: true
    
  sql:
    init:
      mode: always
      data-locations: classpath:data.sql

# Application specific properties  
app:
  jwt:
    access-token:
      secret: myAccessTokenSecret123456789012345678901234567890
      expiration: 900000 # 15 minutes
    refresh-token:
      secret: myRefreshTokenSecret123456789012345678901234567890
      expiration: 604800000 # 7 days
      max-tokens-per-user: 5

logging:
  level:
    com.ecommerce.backend: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE